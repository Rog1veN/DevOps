name: Deploy Next.js site to Pages

on:
  push:
    branches: ["feat/projeto-next"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Ativa cache para instalar mais rápido
          cache-dependency-path: './projeto/package-lock.json'

      - name: Install Dependencies
        run: |
          cd projeto
          npm install

      # --- INSERÇÃO DOS TESTES ---
      - name: Run Tests
        run: |
          cd projeto
          npm test -- --watchAll=false # Roda os testes e encerra (não fica esperando)
      # ---------------------------

      - name: Build Project
        run: |
          cd projeto
          npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./projeto/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Integração com Discord (roda apenas se o deploy terminar)
      - name: Discord Commits
        if: always() # Garante que avise mesmo se falhar, ou remova se quiser aviso só de sucesso
        uses: Sniddl/discord-commits@v1.8
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          template: "avatar-with-link"
          include-extras: true