name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main", "feat/projeto-next"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22 # Atualizei para 22 para sumir o aviso
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Debug Estrutura
        run: |
          echo "Onde estou:"
          pwd
          echo "Conteúdo da raiz:"
          ls -F
          echo "Conteúdo da pasta projeto:"
          ls -F projeto/

      - name: Install dependencies
        run: |
          cd projeto
          npm install

      - name: Build with Next.js
        run: |
          cd projeto
          npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./projeto/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
