name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main", "feat/projeto-next"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: 'projeto/package-lock.json'

      - name: Install dependencies
        # Forçamos a entrada na pasta projeto
        run: cd projeto && npm install

      - name: Build with Next.js
        # Forçamos a entrada na pasta projeto para o build
        run: cd projeto && npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # O artefato final estará dentro de projeto/out
          path: ./projeto/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
